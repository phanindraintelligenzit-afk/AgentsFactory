<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReportGenie AI - Automated Report Generation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: { 50: '#f0f0f3', 100: '#d0d0d8', 200: '#a0a0b0', 700: '#2a2a3a', 800: '#1a1a2e', 900: '#0f0f1a', 950: '#080810' },
            accent: { 400: '#7c6ff7', 500: '#6354e0', 600: '#4f46c0' },
            glow: { purple: '#8b5cf6', blue: '#3b82f6', cyan: '#06b6d4' }
          }
        }
      }
    }
  </script>
  <style>
    :root { --bg: #080810; --card: #1a1a2e; --border: #2a2a3a; --text: #e0e0f0; --muted: #8888a0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.15), 0 0 60px rgba(139, 92, 246, 0.05); }
    .btn-primary { background: linear-gradient(135deg, #6354e0, #8b5cf6); color: white; padding: 10px 20px; border-radius: 8px; font-weight: 600; transition: all 0.2s; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4); }
    .btn-secondary { background: #2a2a3a; color: #c0c0d0; padding: 10px 20px; border-radius: 8px; font-weight: 500; border: 1px solid #3a3a4a; transition: all 0.2s; }
    .btn-secondary:hover { background: #3a3a4a; }
    .input { background: #0f0f1a; border: 1px solid #2a2a3a; color: #e0e0f0; padding: 10px 14px; border-radius: 8px; width: 100%; outline: none; transition: border-color 0.2s; }
    .input:focus { border-color: #6354e0; }
    .select { background: #0f0f1a; border: 1px solid #2a2a3a; color: #e0e0f0; padding: 10px 14px; border-radius: 8px; width: 100%; outline: none; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-draft { background: #2a2a3a; color: #a0a0b0; }
    .badge-generating { background: #1e3a5f; color: #60a5fa; animation: pulse 1.5s infinite; }
    .badge-completed { background: #1a3a2a; color: #4ade80; }
    .badge-error { background: #3a1a1a; color: #f87171; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .source-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .markdown-content h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .markdown-content h2 { font-size: 1.2rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #a78bfa; }
    .markdown-content table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
    .markdown-content th, .markdown-content td { padding: 8px 12px; border: 1px solid #2a2a3a; text-align: left; }
    .markdown-content th { background: #0f0f1a; font-weight: 600; }
    .markdown-content li { margin: 4px 0; padding-left: 8px; }
    .tab-active { border-bottom: 2px solid #8b5cf6; color: #e0e0f0; }
    .tab-inactive { color: #8888a0; }
    .tab-inactive:hover { color: #c0c0d0; }
    .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f0f1a; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen">
  <div id="app"></div>

  <script type="module">
    const API = '/api';

    // ── State ──
    let state = {
      tab: 'dashboard',
      dataSources: [],
      reports: [],
      selectedSources: [],
      generating: null,
      viewingReport: null,
    };

    // ── API helpers ──
    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      if (!res.ok && res.status !== 204) {
        const err = await res.json().catch(() => ({ detail: 'Request failed' }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    // ── Data loading ──
    async function loadDataSources() {
      state.dataSources = await api('/data-sources');
      render();
    }

    async function loadReports() {
      state.reports = await api('/reports');
      render();
    }

    // ── Actions ──
    async function createDataSource(e) {
      e.preventDefault();
      const form = e.target;
      const payload = {
        name: form.name.value,
        source_type: form.source_type.value,
        config: { days: parseInt(form.days.value) || 30 },
      };
      await api('/data-sources', { method: 'POST', body: JSON.stringify(payload) });
      form.reset();
      loadDataSources();
    }

    async function deleteDataSource(id) {
      await api(`/data-sources/${id}`, { method: 'DELETE' });
      loadDataSources();
    }

    async function createReport(e) {
      e.preventDefault();
      const form = e.target;
      const payload = {
        title: form.title.value,
        description: form.description.value,
        template_type: form.template_type.value,
        data_source_ids: state.selectedSources.map(Number),
        output_format: 'html',
      };
      const report = await api('/reports', { method: 'POST', body: JSON.stringify(payload) });
      state.selectedSources = [];
      form.reset();
      loadReports();
      state.tab = 'reports';
      render();
    }

    async function generateReport(id) {
      state.generating = id;
      render();
      try {
        await api('/generate', { method: 'POST', body: JSON.stringify({ report_id: id }) });
        await loadReports();
      } catch (err) {
        alert('Generation failed: ' + err.message);
      }
      state.generating = null;
      render();
    }

    async function viewReport(id) {
      const data = await api(`/reports/${id}/content`);
      state.viewingReport = data;
      render();
    }

    async function deleteReport(id) {
      await api(`/reports/${id}`, { method: 'DELETE' });
      loadReports();
    }

    // ── Source type colors ──
    const sourceColors = {
      stripe: { bg: '#6354e0', text: 'ST' },
      hubspot: { bg: '#ff7a59', text: 'HS' },
      ganalytics: { bg: '#f9ab00', text: 'GA' },
      jira: { bg: '#0052cc', text: 'JR' },
      csv: { bg: '#10b981', text: 'CSV' },
      api: { bg: '#8b5cf6', text: 'API' },
      postgres: { bg: '#336791', text: 'PG' },
      mysql: { bg: '#00758f', text: 'MY' },
    };

    // ── Render ──
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="max-w-7xl mx-auto px-4 py-6">
          ${renderHeader()}
          ${renderTabs()}
          ${state.tab === 'dashboard' ? renderDashboard() : ''}
          ${state.tab === 'sources' ? renderSources() : ''}
          ${state.tab === 'reports' ? renderReports() : ''}
          ${state.tab === 'create' ? renderCreate() : ''}
        </div>
        ${state.viewingReport ? renderModal() : ''}
      `;
      bindEvents();
    }

    function renderHeader() {
      const totalReports = state.reports.length;
      const completed = state.reports.filter(r => r.status === 'completed').length;
      return `
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">
              ReportGenie AI
            </h1>
            <p class="text-sm mt-1" style="color: var(--muted)">Automated multi-source report generation</p>
          </div>
          <div class="flex gap-4">
            <div class="card px-4 py-2 text-center">
              <div class="text-2xl font-bold text-purple-400">${state.dataSources.length}</div>
              <div class="text-xs" style="color: var(--muted)">Sources</div>
            </div>
            <div class="card px-4 py-2 text-center">
              <div class="text-2xl font-bold text-cyan-400">${totalReports}</div>
              <div class="text-xs" style="color: var(--muted)">Reports</div>
            </div>
            <div class="card px-4 py-2 text-center">
              <div class="text-2xl font-bold text-green-400">${completed}</div>
              <div class="text-xs" style="color: var(--muted)">Generated</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderTabs() {
      const tabs = [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'sources', label: 'Data Sources' },
        { id: 'reports', label: 'Reports' },
        { id: 'create', label: '+ New Report' },
      ];
      return `
        <div class="flex gap-6 mb-6 border-b" style="border-color: var(--border)">
          ${tabs.map(t => `
            <button data-tab="${t.id}" class="pb-3 px-1 font-medium transition-colors ${state.tab === t.id ? 'tab-active' : 'tab-inactive'}">
              ${t.label}
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderDashboard() {
      const recentReports = state.reports.slice(0, 5);
      return `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="card glow p-6">
            <h2 class="text-lg font-semibold mb-4">Quick Actions</h2>
            <div class="space-y-3">
              <button data-action="go-sources" class="btn-primary w-full text-left">+ Connect a Data Source</button>
              <button data-action="go-create" class="btn-secondary w-full text-left">+ Create New Report</button>
            </div>
          </div>
          <div class="card glow p-6">
            <h2 class="text-lg font-semibold mb-4">Connected Sources</h2>
            ${state.dataSources.length === 0 ? '<p style="color: var(--muted)">No sources connected yet.</p>' : `
              <div class="space-y-2">
                ${state.dataSources.slice(0, 4).map(ds => {
                  const c = sourceColors[ds.source_type] || { bg: '#666', text: '?' };
                  return `
                    <div class="flex items-center gap-3 p-2 rounded-lg" style="background: #0f0f1a">
                      <div class="source-icon" style="background: ${c.bg}">${c.text}</div>
                      <div>
                        <div class="font-medium text-sm">${ds.name}</div>
                        <div class="text-xs" style="color: var(--muted)">${ds.source_type}</div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            `}
          </div>
          <div class="card glow p-6 lg:col-span-2">
            <h2 class="text-lg font-semibold mb-4">Recent Reports</h2>
            ${recentReports.length === 0 ? '<p style="color: var(--muted)">No reports yet. Create your first one!</p>' : `
              <div class="space-y-2">
                ${recentReports.map(r => `
                  <div class="flex items-center justify-between p-3 rounded-lg" style="background: #0f0f1a">
                    <div>
                      <div class="font-medium">${r.title}</div>
                      <div class="text-xs" style="color: var(--muted)">${r.template_type} &middot; ${new Date(r.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="flex items-center gap-3">
                      <span class="badge badge-${r.status}">${r.status}</span>
                      ${r.status === 'completed' ? `<button data-view="${r.id}" class="text-purple-400 text-sm hover:underline">View</button>` : ''}
                      ${r.status === 'draft' ? `<button data-gen="${r.id}" class="text-cyan-400 text-sm hover:underline">Generate</button>` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            `}
          </div>
        </div>
      `;
    }

    function renderSources() {
      return `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="card glow p-6">
            <h2 class="text-lg font-semibold mb-4">Add Data Source</h2>
            <form id="source-form" class="space-y-4">
              <div>
                <label class="block text-sm font-medium mb-1" style="color: var(--muted)">Name</label>
                <input name="name" class="input" placeholder="e.g. Production Stripe" required />
              </div>
              <div>
                <label class="block text-sm font-medium mb-1" style="color: var(--muted)">Type</label>
                <select name="source_type" class="select">
                  <option value="stripe">Stripe (Revenue)</option>
                  <option value="hubspot">HubSpot (CRM)</option>
                  <option value="ganalytics">Google Analytics</option>
                  <option value="jira">Jira (Engineering)</option>
                  <option value="csv">CSV Upload</option>
                  <option value="api">Generic API</option>
                  <option value="postgres">PostgreSQL</option>
                  <option value="mysql">MySQL</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1" style="color: var(--muted)">Days of History</label>
                <input name="days" type="number" class="input" value="30" min="1" max="365" />
              </div>
              <button type="submit" class="btn-primary w-full">Connect Source</button>
            </form>
          </div>
          <div class="lg:col-span-2 card glow p-6">
            <h2 class="text-lg font-semibold mb-4">Connected Sources (${state.dataSources.length})</h2>
            ${state.dataSources.length === 0 ? '<p style="color: var(--muted)">No sources connected. Add one to get started.</p>' : `
              <div class="space-y-3">
                ${state.dataSources.map(ds => {
                  const c = sourceColors[ds.source_type] || { bg: '#666', text: '?' };
                  return `
                    <div class="flex items-center justify-between p-3 rounded-lg" style="background: #0f0f1a">
                      <div class="flex items-center gap-3">
                        <div class="source-icon" style="background: ${c.bg}">${c.text}</div>
                        <div>
                          <div class="font-medium">${ds.name}</div>
                          <div class="text-xs" style="color: var(--muted)">${ds.source_type} &middot; ${ds.status}</div>
                        </div>
                      </div>
                      <button data-del-source="${ds.id}" class="text-red-400 text-sm hover:underline">Remove</button>
                    </div>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        </div>
      `;
    }

    function renderReports() {
      return `
        <div class="card glow p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold">All Reports (${state.reports.length})</h2>
            <button data-action="go-create" class="btn-primary text-sm">+ New Report</button>
          </div>
          ${state.reports.length === 0 ? '<p style="color: var(--muted)">No reports yet.</p>' : `
            <div class="space-y-3">
              ${state.reports.map(r => `
                <div class="flex items-center justify-between p-4 rounded-lg" style="background: #0f0f1a">
                  <div class="flex-1">
                    <div class="font-medium">${r.title}</div>
                    <div class="text-xs mt-1" style="color: var(--muted)">
                      ${r.template_type} &middot; ${r.data_sources.length} source(s) &middot; ${new Date(r.created_at).toLocaleDateString()}
                    </div>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="badge badge-${r.status}">${r.status}</span>
                    ${r.status === 'completed' ? `<button data-view="${r.id}" class="text-purple-400 text-sm hover:underline">View</button>` : ''}
                    ${r.status === 'draft' ? `<button data-gen="${r.id}" class="btn-primary text-sm">Generate</button>` : ''}
                    ${r.status === 'generating' ? '<span class="text-cyan-400 text-sm">Generating...</span>' : ''}
                    <button data-del-report="${r.id}" class="text-red-400 text-sm hover:underline">Delete</button>
                  </div>
                </div>
              `).join('')}
            </div>
          `}
        </div>
      `;
    }

    function renderCreate() {
      return `
        <div class="card glow p-6 max-w-2xl mx-auto">
          <h2 class="text-lg font-semibold mb-6">Create New Report</h2>
          <form id="report-form" class="space-y-5">
            <div>
              <label class="block text-sm font-medium mb-1" style="color: var(--muted)">Report Title</label>
              <input name="title" class="input" placeholder="e.g. Q2 2026 Executive Summary" required />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1" style="color: var(--muted)">Description</label>
              <input name="description" class="input" placeholder="Brief description..." />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1" style="color: var(--muted)">Template</label>
              <select name="template_type" class="select">
                <option value="executive_summary">Executive Summary</option>
                <option value="financial_report">Financial Report</option>
                <option value="marketing_dashboard">Marketing Dashboard</option>
                <option value="engineering_metrics">Engineering Metrics</option>
                <option value="weekly_status">Weekly Status Report</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium mb-2" style="color: var(--muted)">Select Data Sources</label>
              ${state.dataSources.length === 0 ? '<p class="text-sm" style="color: var(--muted)">No sources available. Connect sources first.</p>' : `
                <div class="space-y-2">
                  ${state.dataSources.map(ds => {
                    const c = sourceColors[ds.source_type] || { bg: '#666', text: '?' };
                    const checked = state.selectedSources.includes(ds.id) ? 'checked' : '';
                    return `
                      <label class="flex items-center gap-3 p-2 rounded-lg cursor-pointer" style="background: #0f0f1a">
                        <input type="checkbox" value="${ds.id}" ${checked} class="source-checkbox w-4 h-4 accent-purple-500" />
                        <div class="source-icon" style="background: ${c.bg}; width:28px; height:28px; font-size:11px">${c.text}</div>
                        <span class="text-sm">${ds.name}</span>
                        <span class="text-xs ml-auto" style="color: var(--muted)">${ds.source_type}</span>
                      </label>
                    `;
                  }).join('')}
                </div>
              `}
            </div>
            <button type="submit" class="btn-primary w-full">Create Report</button>
          </form>
        </div>
      `;
    }

    function renderModal() {
      return `
        <div class="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4" id="modal-overlay">
          <div class="card glow max-w-4xl w-full max-h-[85vh] overflow-auto p-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold">Generated Report</h2>
              <button id="close-modal" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="markdown-content text-sm leading-relaxed" style="color: #c0c0d0">
              ${state.viewingReport.content.replace(/\|/g, ' | ').split('\\n').map(line => {
                if (line.startsWith('# ')) return `<h1>${line.slice(2)}</h1>`;
                if (line.startsWith('## ')) return `<h2>${line.slice(3)}</h2>`;
                if (line.startsWith('|')) return `<tr>${line.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('')}</tr>`;
                if (line.startsWith('- ')) return `<li>${line.slice(2)}</li>`;
                if (line.startsWith('*') && line.endsWith('*')) return `<p class="italic text-xs" style="color:var(--muted)">${line.slice(1, -1)}</p>`;
                if (line.match(/^\d+\./)) return `<li style="list-style:decimal">${line.replace(/^\d+\.\s*/, '')}</li>`;
                if (line.trim() === '') return '<br/>';
                return `<p>${line}</p>`;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function bindEvents() {
      // Tab switching
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.onclick = () => { state.tab = btn.dataset.tab; render(); };
      });

      // Quick actions
      document.querySelectorAll('[data-action]').forEach(btn => {
        btn.onclick = () => {
          if (btn.dataset.action === 'go-sources') { state.tab = 'sources'; render(); }
          if (btn.dataset.action === 'go-create') { state.tab = 'create'; render(); }
        };
      });

      // Source form
      const sourceForm = document.getElementById('source-form');
      if (sourceForm) sourceForm.onsubmit = createDataSource;

      // Delete source
      document.querySelectorAll('[data-del-source]').forEach(btn => {
        btn.onclick = () => deleteDataSource(parseInt(btn.dataset.delSource));
      });

      // Report form
      const reportForm = document.getElementById('report-form');
      if (reportForm) {
        reportForm.querySelectorAll('.source-checkbox').forEach(cb => {
          cb.onchange = () => {
            const id = parseInt(cb.value);
            if (cb.checked) state.selectedSources.push(id);
            else state.selectedSources = state.selectedSources.filter(s => s !== id);
          };
        });
        reportForm.onsubmit = createReport;
      }

      // Generate report
      document.querySelectorAll('[data-gen]').forEach(btn => {
        btn.onclick = () => generateReport(parseInt(btn.dataset.gen));
      });

      // View report
      document.querySelectorAll('[data-view]').forEach(btn => {
        btn.onclick = () => viewReport(parseInt(btn.dataset.view));
      });

      // Delete report
      document.querySelectorAll('[data-del-report]').forEach(btn => {
        btn.onclick = () => deleteReport(parseInt(btn.dataset.delReport));
      });

      // Modal
      const closeModal = document.getElementById('close-modal');
      if (closeModal) closeModal.onclick = () => { state.viewingReport = null; render(); };
      const overlay = document.getElementById('modal-overlay');
      if (overlay) overlay.onclick = (e) => { if (e.target === overlay) { state.viewingReport = null; render(); } };
    }

    // ── Init ──
    async function init() {
      try {
        await Promise.all([loadDataSources(), loadReports()]);
      } catch (err) {
        document.getElementById('app').innerHTML = `
          <div class="max-w-2xl mx-auto mt-20 text-center">
            <h1 class="text-2xl font-bold mb-4">Cannot connect to API</h1>
            <p style="color: var(--muted)">Make sure the backend is running on port 8000.<br/>Error: ${err.message}</p>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
