services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./vendor_risk.db
      - DEBUG=false
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/dashboard/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SQLite is file-based, no separate DB service needed
  # For production, swap to Postgres:
  # db:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_DB: vendorrisk
  #     POSTGRES_USER: app
  #     POSTGRES_PASSWORD: changeme
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
