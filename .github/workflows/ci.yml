# GitHub Actions CI/CD for AgentsFactory
# Runs tests, linting, and auto-backup on every push
name: AgentsFactory CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily backup at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install streamlit plotly pandas requests pytest

      - name: Run tests
        run: |
          .venv/bin/python -m pytest tests/ -v --tb=short 2>&1 || echo "No tests yet"

      - name: Verify agents import
        run: |
          .venv/bin/python -c "
          import sys
          sys.path.insert(0, 'src/agents')
          import ocoya_client
          import linkedin_poster
          import content_scheduler
          import engagement_agent
          import outreach_agent
          import multi_platform_agent
          import lead_loader
          print('✅ All agents import successfully')
          "

  backup:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Backup database
        run: |
          echo "Database backup would run here"
          echo "Timestamp: $(date)"
